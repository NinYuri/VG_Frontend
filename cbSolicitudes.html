<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Viáticos</title>
        <meta name="title" content="Viáticos">
        <meta name="description" content="Gestión de solicitudes, anticipos y comprobación de gastos">

        <!-- ======================= CSS ======================= -->
        <link rel="stylesheet" href="./assets/css/cbSolicitudes.css">

        <!-- ======================= ICONS ======================= -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        
        <!-- ======================= SWEET ALERT ======================= -->
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </head>

    <body>
        <div class="background">
            <!-- ======================= OPTIONS BAR ======================= -->
            <div class="option-bar">
                <div class="logo">
                    <img src="./assets/images/White_logo.webp" alt="GRUPO | PSA">
                    <div class="name">
                        <p>Yuriana Ibarra</p>
                    </div>
                </div>

                <div class="options">
                    <div class="option">
                        <img src="./assets/images/Grid.webp" alt="Grid">
                        <p>Panel principal</p>
                    </div>
                    
                    <div class="option">
                        <i class="fa-solid fa-plane-departure"></i>
                        <p>Solicitudes</p>
                    </div>

                    <div class="option">
                        <img src="./assets/images/Payment.webp" alt="Payment">
                        <p>Comprobaciones</p>
                    </div>

                    <div class="option">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        <p>Historial</p>
                    </div>
                </div>

                <div class="logout">
                    <div class="option">
                        <i class="fa-solid fa-arrow-right-from-bracket fa-rotate-180"></i>
                        <p>Cerrar sesión</p>
                    </div>
                </div>
            </div>

            <!-- ======================= CONTENT CONTAINER ======================= -->
            <div class="content-container">
                <div class="container">
                    <!-- ==================== CONTENT HEADER ==================== -->
                    <div class="content-header">
                        <div class="titles">
                            <h1 class="title">SOLICITUDES DE VIÁTICOS</h1>
                            <p class="subtitle">Gestiona tus solicitudes y da seguimiento a su estado</p>
                        </div>
                        
                        <div class="button">
                            <p><i class="fa-solid fa-plus"></i>Solicitar</p>
                        </div>
                    </div>

                    <!-- ==================== CONTENT TABLE ==================== -->
                    <div class="content-table">
                        <div class="tab-header">
                            <div class="tabs">
                                <div class="tab everything selected"><p class="tab-selected">Todas</p></div>
                                <div class="tab pending"><p>Pendientes</p></div>
                                <div class="tab approved"><p>Aprobadas</p></div>
                                <div class="tab rejected"><p>Rechazadas</p></div>
                                <div class="tab canceled"><p>Canceladas</p></div>
                            </div>

                            <div class="search">
                                <div class="search-back">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                    <input type="text" placeholder="Folio. . .">
                                    <i class="fa-regular fa-calendar"></i>
                                </div>
                            </div>
                        </div>

                        <div class="table-background">
                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Folio</th>
                                            <th>Fecha de solicitud</th>
                                            <th>Destino</th>
                                            <th>Motivo</th>
                                            <th>Monto total</th>
                                            <th>Estado</th>
                                        </tr>
                                    </thead>

                                    <tbody id="table-body">
                                        <!-- Las filas de la tabla se generarán dinámicamente con JavaScript -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="./assets/js/cbSolicitudes.js"></script>
    </body>
</html>
